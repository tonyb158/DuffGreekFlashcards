<!DOCTYPE html>
<html>
<head>
    <hr>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greek Flashcards</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<script src="js/app.js" defer></script>

<body>

    <label for="chapterSelect">Study:</label>

    <select id="chapterSelect">
        <option value="all">All Chapters</option>
    </select>

    <button onclick="startSession()">
        Start Session
    </button>

    <div id="card" class="card" onclick="flipCard()">

        <h1 id="greekWord"></h1>

        <p id="definition" style="display:none;"></p>

    </div>

        <br><br>

        <button onclick="knewIt()">
            ✓ Knew It
        </button>

        <button onclick="missedIt()">
            ✗ Missed It
        </button>

<p id="remaining"></p>
<p id="stats"></p>
    </div>

</body>
</html>
